name: Build Apptainer Container on Release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: read

jobs:
  build-apptainer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Apptainer image from Docker
        run: |
          apptainer build synthstrip-n3_${{ github.event.release.tag_name }}.sif \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}

      - name: Upload Apptainer image to release
        uses: softprops/action-gh-release@v1
        with:
          files: synthstrip-n3_${{ github.event.release.tag_name }}.sif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
